<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Blocked</title>
    <link rel="stylesheet" href="/static/style/variables.css">
    <link rel="stylesheet" href="/static/style/components.css">
    <link rel="icon" href="/static/material/favicon.ico" type="image/x-icon">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .blocked-card { background: var(--surface); padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 500px; width: 100%; border: 1px solid var(--border); }
        .blocked-card h1 { color: #dc3545; margin-bottom: 15px; font-size: 26px; }
        .blocked-card p { font-size: 16px; color: var(--text); margin-bottom: 20px; }
        .countdown { font-size: 36px; font-weight: bold; color: var(--primary); margin: 20px 0; font-family: monospace; }
        .url-display { display: inline-block; background: #f4f7f6; padding: 8px 16px; border-radius: 6px; font-weight: 600; margin-bottom: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="blocked-card">
        <h1>🚫 ACCESS BLOCKED</h1>
        <p>This website is restricted to help you stay focused.</p>
        <div class="url-display" id="target-url">Loading...</div>
        <p id="time-label">Time remaining:</p>
        <div class="countdown" id="countdown">--:--:--</div>
        <button class="btn outline" onclick="window.history.back()">Go back</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get("url");
        const unlockAt = parseInt(urlParams.get("unlock"), 10);
        const mode = urlParams.get("mode");

        document.getElementById("target-url").innerText = targetUrl || "Unknown";
        const countdownEl = document.getElementById("countdown");
        const timeLabelEl = document.getElementById("time-label");

        function updateCountdown() {
            const now = Math.floor(Date.now() / 1000);
            const remaining = unlockAt - now;

            if (remaining <= 0) {
                countdownEl.innerText = "00:00:00";
                countdownEl.style.color = "#28a745";
                timeLabelEl.innerText = "The block has ended. You can access this website again.";
                return;
            }

            const h = Math.floor(remaining / 3600).toString().padStart(2, "0");
            const m = Math.floor((remaining % 3600) / 60).toString().padStart(2, "0");
            const s = (remaining % 60).toString().padStart(2, "0");

            countdownEl.innerText = (mode === "permanent") ? `At least ${h}:${m}:${s}` : `${h}:${m}:${s}`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
