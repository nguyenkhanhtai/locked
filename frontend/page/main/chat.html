{% extends "aux/base.html" %}

{% block content %}
<div id="chat" class="page active">
                    <div class="header">
                        <h2>AI Assistant</h2>
                    </div>
                    <div
                        style="display: flex; height: calc(100vh - 150px); background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden;">
                        <aside
                            style="width: 280px; border-right: 1px solid var(--border); background: #fbfbfb; display: flex; flex-direction: column; min-height: 0;">
                            <div
                                style="padding: 16px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px;">
                                <button id="btn-new-chat" class="btn primary" style="width: 100%;">New Chat</button>
                                <div id="chat-temporary-tab"
                                    style="padding: 10px 12px; border-radius: 10px; border: 1px dashed var(--border); cursor: pointer; font-size: 13px; line-height: 1.4; background: #ffffff;">
                                    <strong style="display: block;">New Chat</strong>
                                </div>
                            </div>
                            <div
                                style="padding: 12px 16px 8px; font-size: 12px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.04em;">
                            </div>
                            <div id="chat-session-list"
                                style="flex: 1; min-height: 0; overflow-y: auto; padding: 0 10px 12px; display: flex; flex-direction: column; gap: 8px;">
                            </div>
                        </aside>
                        <div style="flex: 1; min-width: 0; display: flex; flex-direction: column;">
                            <div
                                style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: #fff; padding: 14px 18px;">
                                <div id="chat-current-label" style="font-size: 13px; font-weight: 600; color: #555;">New
                                    Chat</div>
                                <button id="btn-delete-chat-session" class="btn-del-badge hidden"
                                    title="Delete Chat">✖</button>
                            </div>
                            <div id="chat-messages"
                                style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px;">
                                <div class="chat-message bot"
                                    style="align-self: flex-start; background: #f0f0f0; padding: 12px 16px; border-radius: 12px 12px 12px 0; max-width: 80%; line-height: 1.5;">
                                    👋 Hi! I'm your AI assistant. Have you configured your API key in Settings? What can
                                    I
                                    help you with today?
                                </div>
                            </div>
                            <div
                                style="padding: 15px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; background: #fff;">
                                <div style="display: flex; gap: 10px; align-items: flex-end;">
                                    <textarea id="chat-input"
                                        placeholder="Type a message... (Shift + Enter for a new line)"
                                        style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border); resize: none; height: 45px; max-height: 150px; font-family: inherit; font-size: 14px; outline: none;"></textarea>
                                    <button id="btn-send-chat" class="btn primary"
                                        style="padding: 0 20px; height: 45px; display: flex; align-items: center; justify-content: center;">Gửi</button>
                                </div>
                                <div
                                    style="display: flex; gap: 10px; align-items: center;">
                                    
                                    <button id="btn-chat-open-settings" class="btn outline"
                                        style="flex: 1; padding: 8px 12px; font-size: 11px; display: flex; align-items: center; justify-content: space-between; background: #fff; border-radius: 8px; border: 1px solid var(--border); font-weight: 600;">
                                        <div style="display: flex; align-items: center; gap: 8px;">
                                            <span id="chat-current-provider-badge"
                                                style="background: var(--primary); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase;">GEMINI</span>
                                            <span id="chat-current-model-display"
                                                style="color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 250px;">Loading...</span>
                                        </div>
                                        <span style="font-size: 10px; color: #888;">⚙️ AI Configuration</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
{% endblock %}
