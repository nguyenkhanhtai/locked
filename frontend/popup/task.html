<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked - Quick Task</title>
    <link rel="stylesheet" href="/static/style/variables.css">
    <link rel="stylesheet" href="/static/style/components.css">
    <style>
        body { padding: 30px 40px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--surface); color: var(--text); display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; margin: 0; }
        h3 { font-size: 24px; margin-top: 0; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        form { display: flex; flex-direction: column; flex: 1; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .form-group label { font-weight: 600; font-size: 15px; }
        .form-group input, .form-group select, .form-group textarea { padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); font-size: 15px; width: 100%; box-sizing: border-box; font-family: inherit; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: auto; padding-top: 20px; }
        .actions .btn { padding: 10px 24px; font-size: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>📝 Add Task</h3>
    <form id="task-form">
        <div class="form-group">
            <label>Task name:</label>
            <input type="text" id="name" required placeholder="Example: Finish report...">
        </div>
        <div class="form-group">
            <label>Description (optional):</label>
            <textarea id="description" rows="3" placeholder="Add some details..."></textarea>
        </div>
        
        <div class="form-group" style="flex-direction: row; gap: 10px;">
            <div style="flex: 2; display: flex; flex-direction: column; gap: 5px;">
                <label>Date:</label>
                <input type="date" id="date" required>
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                <label>Hour:</label>
                <input type="number" id="hour" min="0" max="23" value="23" required>
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                <label>Min:</label>
                <input type="number" id="minute" min="0" max="59" value="59" required>
            </div>
        </div>

        <div class="actions">
            <button type="button" class="btn outline" id="btn-cancel">Cancel</button>
            <button type="submit" class="btn primary">Add Task</button>
        </div>
    </form>

    <script>
        document.getElementById('date').valueAsDate = new Date();

        function closeWindow() { if (window.pywebview) pywebview.api.close(); else window.close(); }
        document.getElementById('btn-cancel').addEventListener('click', closeWindow);

        document.getElementById('task-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const dateStr = document.getElementById('date').value;
            const hour = document.getElementById('hour').value.padStart(2, '0');
            const minute = document.getElementById('minute').value.padStart(2, '0');
            
            const datetimeStr = `${dateStr}T${hour}:${minute}:00`;
            const endDate = Math.floor(new Date(datetimeStr).getTime() / 1000);

            const data = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                end_date: endDate, priority: 3, labels: "", done: false
            };

            try {
                const res = await fetch('http://127.0.0.1:8765/api/events', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                res.ok ? closeWindow() : alert((await res.json()).message || 'Error occurred');
            } catch (err) { alert('Failed to connect to backend.'); }
        });
    </script>
</body>
</html>
