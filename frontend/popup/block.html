<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locked - Quick Block</title>
    <link rel="stylesheet" href="/static/style/variables.css">
    <link rel="stylesheet" href="/static/style/components.css">
    <style>
        body { padding: 30px 40px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--surface); color: var(--text); display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; margin: 0; }
        h3 { font-size: 24px; margin-top: 0; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        form { display: flex; flex-direction: column; flex: 1; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .form-group label { font-weight: 600; font-size: 15px; }
        .form-group input, .form-group select, .form-group textarea { padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); font-size: 15px; width: 100%; box-sizing: border-box; font-family: inherit; transition: border-color 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .actions { display: flex; justify-content: flex-end; gap: 15px; margin-top: auto; padding-top: 20px; }
        .actions .btn { padding: 10px 24px; font-size: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>🚫 Quick Block</h3>
    <form id="block-form">
        <div class="form-group">
            <label>Detected URL:</label>
            <input type="text" id="url" readonly style="background: var(--surface-hover, #f8f9fa); color: #555;">
        </div>
        <div class="form-group">
            <label>Mode:</label>
            <select id="mode">
                <option value="temporary">Temporary</option>
                <option value="permanent">Permanent</option>
            </select>
            <p id="mode-desc" style="font-size: 12px; color: #666; margin: 0;">* Block for a specific duration.</p>
        </div>
        
        <div id="temp-inputs" class="form-group" style="flex-direction: row; gap: 10px;">
            <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                <label>Hours:</label>
                <input type="number" id="hours" min="0" max="11" value="1">
            </div>
            <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                <label>Minutes:</label>
                <input type="number" id="minutes" min="0" max="59" value="0">
            </div>
        </div>

        <div id="perm-inputs" class="form-group" style="display: none; flex-direction: column; gap: 5px;">
            <label>Days:</label>
            <input type="number" id="days" min="0" max="365" value="1">
        </div>

        <div class="actions">
            <button type="button" class="btn outline" id="btn-cancel">Cancel</button>
            <button type="submit" class="btn primary danger">BLOCK</button>
        </div>
    </form>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('url').value = urlParams.get('url') || '';
        const modeSelect = document.getElementById('mode'), tempInputs = document.getElementById('temp-inputs'), permInputs = document.getElementById('perm-inputs'), modeDesc = document.getElementById('mode-desc');

        modeSelect.addEventListener('change', (e) => {
            if (e.target.value === 'temporary') {
                tempInputs.style.display = 'flex'; permInputs.style.display = 'none';
                modeDesc.textContent = '* Block for a specific duration.';
            } else {
                tempInputs.style.display = 'none'; permInputs.style.display = 'flex';
                modeDesc.textContent = '* Block for a number of days.';
            }
        });

        function closeWindow() { if (window.pywebview) pywebview.api.close(); else window.close(); }
        document.getElementById('btn-cancel').addEventListener('click', closeWindow);

        document.getElementById('block-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const mode = modeSelect.value;
            let duration = {};
            if (mode === 'temporary') {
                const h = parseInt(document.getElementById('hours').value), m = parseInt(document.getElementById('minutes').value);
                if (h < 0 || h > 11 || m < 0 || m > 59 || (h === 0 && m === 0)) return alert("Input must be 0-11h and 0-59m!");
                duration = { hours: h, minutes: m, seconds: 0 };
            } else {
                const d = parseInt(document.getElementById('days').value);
                if (d < 0 || d > 365) return alert("Days must be 0-365.");
                duration = { days: d, hours: 0, minutes: 0, seconds: 0 };
            }
            try {
                const res = await fetch('http://127.0.0.1:8765/api/block', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url: document.getElementById('url').value, mode: mode, duration: duration }) });
                res.ok ? closeWindow() : alert((await res.json()).message || 'Error occurred');
            } catch (err) { alert('Failed to connect to backend.'); }
        });
    </script>
</body>
</html>
